name: CI - RickMorty FastAPI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build Docker image
        run: docker build -t rickmorty-fastapi:ci .

      - name: Start container
        run: docker run -d --name rickmorty-ci -p 8000:8000 rickmorty-fastapi:ci

      - name: Wait for app readiness (up to 60s)
        run: |
          last_error=""
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/healthcheck >/dev/null; then
              echo "App is ready"
              exit 0
            fi
            last_error=$(curl -sS http://127.0.0.1:8000/healthcheck || true)
            echo "Waiting for app... ($i/30) last_error=${last_error}"
            sleep 2
          done
          echo "App did not become ready in 60s"
          exit 1

      - name: Run smoke tests against container
        run: bash scripts/smoke_test.sh http://127.0.0.1:8000

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "--- docker ps -a ---"
          docker ps -a || true
          echo "--- docker logs rickmorty-ci ---"
          docker logs rickmorty-ci || true
          echo "--- curl -v healthcheck ---"
          curl -v http://127.0.0.1:8000/healthcheck || true

      - name: Cleanup container
        if: always()
        run: docker rm -f rickmorty-ci || true

  kind-k8s-smoke:
    runs-on: ubuntu-latest
    needs: test-and-docker-smoke
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Docker image for kind
        run: docker build -t rickmorty-fastapi:ci .

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0

      - name: Load image into kind
        run: kind load docker-image rickmorty-fastapi:ci

      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply -f yamls/
          kubectl set image deployment/rickmorty-service rickmorty-service=rickmorty-fastapi:ci
          kubectl rollout status deployment/rickmorty-service --timeout=120s
          kubectl get all

      - name: Port-forward service
        run: |
          kubectl port-forward svc/rickmorty-service 18080:80 >/tmp/port-forward.log 2>&1 &
          echo $! > /tmp/pf.pid

      - name: Wait for forwarded endpoint
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:18080/healthcheck >/dev/null; then
              echo "Port-forward endpoint is ready"
              exit 0
            fi
            echo "Waiting for forwarded app... ($i/20)"
            sleep 2
          done
          cat /tmp/port-forward.log || true
          exit 1

      - name: Run smoke tests against kind service
        run: bash scripts/smoke_test.sh http://127.0.0.1:18080

      - name: Cleanup port-forward
        if: always()
        run: |
          if [[ -f /tmp/pf.pid ]]; then kill $(cat /tmp/pf.pid) || true; fi
