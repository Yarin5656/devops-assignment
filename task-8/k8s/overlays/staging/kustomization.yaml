apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: url-shortener-staging

commonLabels:
  environment: staging

bases:
  - ../../base

# Override the image tag – set by CI/CD pipeline
images:
  - name: localhost:5001/url-shortener
    newTag: "latest"              # replaced by: kustomize edit set image ... :<tag>

patches:
  - path: patch-deployment.yaml

configMapGenerator:
  - name: url-shortener-config
    behavior: merge
    literals:
      - BASE_URL=http://url-shortener-staging.local
      - LOG_LEVEL=DEBUG
      - APP_VERSION=staging
