apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  labels:
    app: url-shortener
    component: api
spec:
  replicas: 1                     # overridden by overlay
  selector:
    matchLabels:
      app: url-shortener
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0           # zero-downtime: new pods up before old pods down
      maxSurge: 1
  template:
    metadata:
      labels:
        app: url-shortener
        component: api
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # -----------------------------------------------------------------------
      # Security context (pod-level)
      # -----------------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534          # nobody
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      # -----------------------------------------------------------------------
      # Graceful shutdown
      # -----------------------------------------------------------------------
      terminationGracePeriodSeconds: 30

      containers:
        - name: url-shortener
          image: localhost:5001/url-shortener:latest   # overridden by overlay
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # -------------------------------------------------------------------
          # Environment – non-sensitive values from ConfigMap
          # -------------------------------------------------------------------
          envFrom:
            - configMapRef:
                name: url-shortener-config

          # Sensitive values from Secret (see docs/secrets-management.md)
          # env:
          #   - name: SOME_SECRET
          #     valueFrom:
          #       secretKeyRef:
          #         name: url-shortener-secret
          #         key: some-key

          # -------------------------------------------------------------------
          # Resource requests / limits
          # -------------------------------------------------------------------
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # -------------------------------------------------------------------
          # Probes
          # -------------------------------------------------------------------
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 10
            periodSeconds: 3

          # -------------------------------------------------------------------
          # Container security context
          # -------------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
