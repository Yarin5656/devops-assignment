# =============================================================================
# CD Pipeline – Staging (auto) + Production (manual approval or tag push)
#
# Triggers
# --------
#   workflow_dispatch  – manual trigger with environment + image_tag inputs
#   push tags v*.*.*  – automatic production deploy for release tags
#
# Required GitHub Secrets
# -----------------------
#   KUBECONFIG_STAGING    – base64-encoded kubeconfig for staging cluster
#   KUBECONFIG_PRODUCTION – base64-encoded kubeconfig for production cluster
#
# Local kind setup:
#   scripts/setup-kind.sh creates the cluster and prints the kubeconfig.
#   Encode: kind get kubeconfig --name url-shortener-local | base64 -w0
#   Then store as KUBECONFIG_STAGING in GitHub → Settings → Secrets.
#
# Rollback: see RUNBOOK.md § Rollback Procedure
# =============================================================================

name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to deploy (e.g. 1.2.3-abc1234)"
        required: true
        type: string

  # Auto-deploy production when a semver tag is pushed
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/url-shortener

jobs:
  # ---------------------------------------------------------------------------
  # Staging: auto-deploy on workflow_dispatch(staging) or non-tag push
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://url-shortener-staging.local
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') ||
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace url-shortener-staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tag in kustomize overlay
        working-directory: task-8/k8s/overlays/staging
        run: |
          kustomize edit set image \
            localhost:5001/url-shortener=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Apply manifests
        working-directory: task-8
        run: |
          kustomize build k8s/overlays/staging | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/url-shortener \
            -n url-shortener-staging \
            --timeout=120s

      - name: Smoke test – healthz
        run: |
          kubectl run smoke-test \
            --image=curlimages/curl:8.7.1 \
            --restart=Never \
            --rm \
            -n url-shortener-staging \
            --command -- curl -sf http://url-shortener/healthz
        timeout-minutes: 2

  # ---------------------------------------------------------------------------
  # Production: manual approval gate via GitHub environment protection rules
  # Set up: GitHub → Settings → Environments → production → Required reviewers
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://short.example.com
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Strip 'v' prefix from the tag name (v1.2.3 → 1.2.3)
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace url-shortener-production --dry-run=client -o yaml | kubectl apply -f -

      - name: Record current image (for rollback reference)
        id: current
        run: |
          CURRENT=$(kubectl get deployment/url-shortener \
            -n url-shortener-production \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "image=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Update image tag
        working-directory: task-8/k8s/overlays/production
        run: |
          kustomize edit set image \
            localhost:5001/url-shortener=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Apply manifests
        working-directory: task-8
        run: |
          kustomize build k8s/overlays/production | kubectl apply -f -

      - name: Wait for rollout (auto-rollback on failure)
        run: |
          if ! kubectl rollout status deployment/url-shortener \
               -n url-shortener-production \
               --timeout=180s; then
            echo "::error::Rollout failed! Rolling back to previous version..."
            kubectl rollout undo deployment/url-shortener -n url-shortener-production
            kubectl rollout status deployment/url-shortener \
              -n url-shortener-production --timeout=120s
            exit 1
          fi

      - name: Smoke test production
        run: |
          kubectl run smoke-prod \
            --image=curlimages/curl:8.7.1 \
            --restart=Never \
            --rm \
            -n url-shortener-production \
            --command -- curl -sf http://url-shortener/healthz
        timeout-minutes: 2

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy FAILED."
          echo "::error::Previous image was: ${{ steps.current.outputs.image }}"
          echo "::error::Manual rollback: kubectl rollout undo deployment/url-shortener -n url-shortener-production"
