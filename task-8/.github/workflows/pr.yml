# =============================================================================
# PR Checks – runs on every pull request to main or develop
#
# Jobs:  lint → test → security-scan
# No image push on PRs (read-only CI).
#
# Required secrets: none for PR checks.
# =============================================================================

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "task-8/**"

defaults:
  run:
    working-directory: task-8

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: task-8/app/requirements.txt

      - name: Install linter
        run: pip install ruff==0.4.10

      - name: Ruff check
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  test:
    name: Unit Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: task-8/app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests with coverage
        run: |
          cd app
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: task-8/app/coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: task-8/app/test-results.xml

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning (no push)
        run: docker build -t url-shortener:pr-scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: url-shortener:pr-scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Run Trivy SARIF output (for GitHub Security tab)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: url-shortener:pr-scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
