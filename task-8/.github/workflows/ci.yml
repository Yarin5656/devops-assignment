# =============================================================================
# CI Pipeline – runs on push to main and develop
#
# Jobs:  lint → test → security-scan → build-push → trigger-staging-deploy
#
# Required GitHub Secrets
# -----------------------
#   GHCR_TOKEN   – GitHub Personal Access Token with packages:write scope.
#                  Alternatively, GITHUB_TOKEN works if the workflow has
#                  id-token: write permission (set below).
#
# Image pushed to:
#   ghcr.io/<owner>/<repo>/url-shortener:<tag>   (CI default)
#   localhost:5001/url-shortener:<tag>            (local kind)
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "task-8/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/url-shortener

defaults:
  run:
    working-directory: task-8

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: task-8/app/requirements.txt
      - run: pip install ruff==0.4.10
      - run: ruff check app/ && ruff format --check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: task-8/app/requirements.txt
      - run: pip install -r app/requirements.txt
      - name: Run pytest
        run: |
          cd app
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage
          path: task-8/app/coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t url-shortener:${{ github.sha }} .
      - name: Trivy scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: url-shortener:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: task-8
          file: task-8/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags:  ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  trigger-staging-deploy:
    name: Trigger Staging Deploy
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Dispatch staging CD workflow
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd.yml',
              ref: context.ref,
              inputs: {
                environment: 'staging',
                image_tag: '${{ needs.build-push.outputs.image_tag }}'
              }
            })
