# =============================================================================
# Default Helm values – url-shortener
# Override per environment via values-staging.yaml / values-production.yaml
# =============================================================================

replicaCount: 1

image:
  repository: localhost:5001/url-shortener
  tag: "latest"                 # set by CI: --set image.tag=<semver-sha>
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: url-shortener.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Application environment variables (non-sensitive)
env:
  APP_VERSION: "unknown"
  BASE_URL: "http://url-shortener"
  LOG_LEVEL: "INFO"
  CODE_LENGTH: "6"

# Sensitive values are injected from a Kubernetes Secret.
# Set existingSecret to the secret name, OR fill secretValues to create one.
# See docs/secrets-management.md for rotation procedures.
secret:
  existingSecret: ""            # if set, use this pre-existing Secret
  secretValues: {}              # placeholder: {SOME_API_KEY: "changeme"}

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Probes
readinessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: 8000
  failureThreshold: 10
  periodSeconds: 3

# Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
